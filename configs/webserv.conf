server {
    listen 8080 8081;
    host 127.0.0.1;
    server_name example.com;
    
    error_page 404 ./www/html/errors/404.html;

    # to redirect
     #location / {

        #return 301 /red;
     #}
    #remove the last / from the path.

    location / {
        root ./pages;
        allowed_methods GET POST;
        upload_path ./pages/uploads;
        index ./pages/index.html;
        # autoindex on;
    }
    location /images{
        root ./pages/images;
        allowed_methods GET DELETE;
        upload_path ./pages/images;
        #test 
        autoindex on;
        # index ./pages/page2.html;
        # what if the url point ot directory ?
        # interesting
    }
     
    location /videos{
        root ./pages/videos;
        index ./pages/index.html;
        allowed_methods GET DELETE;
        # autoindex on;
    }
    
    location /errors{
        root ./pages/errors;
        allowed_methods GET;
    }
}
